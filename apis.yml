aid: davita-healthcare-partners
name: DaVita HealthCare Partners
description: >-
  DaVita HealthCare Partners is the legacy name for the combined entity of
  DaVita and HealthCare Partners following their 2012 merger. The HealthCare
  Partners group operated medical groups and physician networks managing
  Medicare Advantage and other coordinated care patients before being
  divested by DaVita in 2019. DaVita continues to provide kidney care and
  dialysis services. No public developer API has been identified for the
  combined entity or the historical HealthCare Partners group.
